name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      note:
        description: Optional note for this manual deploy (e.g. testing after outage)
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Manual run info
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual deploy triggered on ref: ${{ github.ref }}"
          echo "Note: ${{ inputs.note || '(none)' }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/robots.txt
          test -f dist/sitemap-index.xml
          test -f dist/CNAME
          test -f dist/.nojekyll
          grep -q 'Creative LED Control' dist/index.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
