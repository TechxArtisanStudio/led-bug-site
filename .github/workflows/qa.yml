name: QA

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      note:
        description: Optional note for this manual QA run (e.g. testing after outage)
        required: false
        type: string

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Manual run info
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual QA triggered on ref: ${{ github.ref }}"
          echo "Note: ${{ inputs.note || '(none)' }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/robots.txt
          test -f dist/sitemap-index.xml
          test -f dist/CNAME
          test -f dist/.nojekyll
          grep -q 'Creative LED Control' dist/index.html
